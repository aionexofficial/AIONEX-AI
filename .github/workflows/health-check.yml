name: Integration Health Check

on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-integrations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      CREATOMATE_API_KEY: ${{ secrets.CREATOMATE_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Verify required services
        run: |
          node <<'NODE'
          const { neon } = require('@neondatabase/serverless');
          const results = {};
          async function check(name, fn) {
            try { await fn(); results[name] = { ok: true }; }
            catch (error) { results[name] = { ok: false, error: String(error.message || error).slice(0, 300) }; }
          }
          async function request(url, options = {}) {
            const response = await fetch(url, { ...options, signal: AbortSignal.timeout(20000) });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response;
          }
          await check('openai', () => request('https://api.openai.com/v1/models', { headers: { Authorization: `Bearer ${process.env.OPENAI_API_KEY}` } }));
          await check('telegram', () => request(`https://api.telegram.org/bot${process.env.TELEGRAM_BOT_TOKEN}/getMe`));
          await check('x', () => request('https://api.x.com/2/tweets/search/recent?query=AIONEX&max_results=10', { headers: { Authorization: `Bearer ${process.env.X_BEARER_TOKEN}` } }));
          await check('youtube', async () => {
            const token = await request('https://oauth2.googleapis.com/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams({ client_id: process.env.GOOGLE_CLIENT_ID, client_secret: process.env.GOOGLE_CLIENT_SECRET, refresh_token: process.env.YOUTUBE_REFRESH_TOKEN, grant_type: 'refresh_token' }) });
            const data = await token.json();
            await request('https://www.googleapis.com/youtube/v3/channels?part=id&mine=true', { headers: { Authorization: `Bearer ${data.access_token}` } });
          });
          await check('elevenlabs', () => request('https://api.elevenlabs.io/v2/voices?page_size=1', { headers: { 'xi-api-key': process.env.ELEVENLABS_API_KEY } }));
          await check('creatomate', () => request('https://api.creatomate.com/v1/templates', { headers: { Authorization: `Bearer ${process.env.CREATOMATE_API_KEY}` } }));
          await check('neon', async () => { const rows = await neon(process.env.DATABASE_URL)`SELECT 1 AS ok`; if (rows[0]?.ok !== 1) throw new Error('Unexpected database response'); });
          require('fs').writeFileSync('health-results.json', JSON.stringify(results, null, 2));
          console.table(Object.fromEntries(Object.entries(results).map(([k, v]) => [k, v.ok ? 'ok' : 'failed'])));
          if (Object.values(results).some(result => !result.ok)) process.exit(1);
          NODE

      - name: Save health results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-health-${{ github.run_id }}
          path: health-results.json
          retention-days: 14

