name: Production Deploy Check

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_BOT_USERNAME: ${{ secrets.TELEGRAM_BOT_USERNAME }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
      NEXT_PUBLIC_SITE_URL: https://aionex-ai.vercel.app
      AUTO_PUBLISH: ${{ secrets.AUTO_PUBLISH }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      CREATOMATE_API_KEY: ${{ secrets.CREATOMATE_API_KEY }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REDIRECT_URI: https://aionex-ai.vercel.app/api/admin/youtube/oauth/callback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:production-env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Verify production deployment
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 10 https://aionex-ai.vercel.app/ > /dev/null
          curl --fail --silent --show-error --retry 3 --retry-delay 10 https://aionex-ai.vercel.app/api/health | tee production-health.json
          node -e "const h=require('./production-health.json'); if(h.status!=='ok'||h.database!==true) process.exit(1)"

      - name: Save production verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-check-${{ github.run_id }}
          path: production-health.json
          if-no-files-found: ignore
          retention-days: 14
