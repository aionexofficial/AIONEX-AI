name: Hourly Automation

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: hourly-production-automation
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call production automation endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ENDPOINT: https://aionex-ai.vercel.app/api/cron/automation
        run: |
          set -o pipefail
          : > automation.log
          for attempt in 1 2; do
            status=$(curl --silent --show-error --max-time 310 \
              --output response.json --write-out "%{http_code}" \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              "${ENDPOINT}" || true)
            printf 'attempt=%s status=%s\n' "$attempt" "$status" | tee -a automation.log
            if [ "$status" = "200" ] && node -e "const r=require('./response.json'); if(r.ok!==true) process.exit(1)"; then
              cat response.json >> automation.log
              exit 0
            fi
            cat response.json >> automation.log 2>/dev/null || true
            [ "$attempt" = "1" ] && sleep 20
          done
          exit 1

      - name: Save automation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly-automation-${{ github.run_id }}
          path: |
            automation.log
            response.json
          retention-days: 14

